services:
  db:
    image: postgres:16-alpine
    container_name: pjtaudi-db
    environment:
      POSTGRES_USER: ${DB_USER:-pjtaudi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${DB_NAME:-pjtaudi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pjtaudi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pjtaudi-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: pjtaudi-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pjtaudi-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: pjtaudi-api
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DB_USER:-pjtaudi}:${DB_PASSWORD:-dev_password_change_me}@db:5432/${DB_NAME:-pjtaudi}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: ${API_PORT:-4000}
      SERVER_PORT: ${SERVER_PORT:-3000}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_SHEETS_CREDENTIALS: /opt/google-credentials/google-credentials.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-4000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /home/audira/pjtaudirabot/logs:/app/logs
      - ${GOOGLE_SHEETS_CREDENTIALS_HOST_PATH:-/dev/null}:/opt/google-credentials/google-credentials.json:ro
    networks:
      - pjtaudi-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          memory: 256M

  whatsapp:
    image: ${WHATSAPP_IMAGE:?WHATSAPP_IMAGE is required}
    container_name: pjtaudi-whatsapp
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DB_USER:-pjtaudi}:${DB_PASSWORD:-dev_password_change_me}@db:5432/${DB_NAME:-pjtaudi}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_NOC_CHAT_ID: ${TELEGRAM_NOC_CHAT_ID}
      WHATSAPP_SESSION_DIR: /data/whatsapp-sessions
      WHATSAPP_PORT: ${WHATSAPP_PORT:-4020}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_SHEETS_ENABLED: ${GOOGLE_SHEETS_ENABLED:-false}
      GOOGLE_SHEETS_CREDENTIALS: /opt/google-credentials/google-credentials.json
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${WHATSAPP_PORT:-4020}:${WHATSAPP_PORT:-4020}"
    volumes:
      - whatsapp_sessions:/data/whatsapp-sessions
      - /home/audira/pjtaudirabot/logs:/app/logs
      - ${GOOGLE_SHEETS_CREDENTIALS_HOST_PATH:-/dev/null}:/opt/google-credentials/google-credentials.json:ro
    networks:
      - pjtaudi-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M

  telegram:
    image: ${TELEGRAM_IMAGE:?TELEGRAM_IMAGE is required}
    container_name: pjtaudi-telegram
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DB_USER:-pjtaudi}:${DB_PASSWORD:-dev_password_change_me}@db:5432/${DB_NAME:-pjtaudi}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_PORT: ${TELEGRAM_PORT:-4010}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_SHEETS_ENABLED: ${GOOGLE_SHEETS_ENABLED:-false}
      GOOGLE_SHEETS_CREDENTIALS: /opt/google-credentials/google-credentials.json
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${TELEGRAM_PORT:-4010}:${TELEGRAM_PORT:-4010}"
    volumes:
      - /home/audira/pjtaudirabot/logs:/app/logs
      - ${GOOGLE_SHEETS_CREDENTIALS_HOST_PATH:-/dev/null}:/opt/google-credentials/google-credentials.json:ro
    networks:
      - pjtaudi-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

networks:
  pjtaudi-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:
